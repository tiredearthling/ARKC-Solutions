<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - ARKC Solutions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <strong class="logo">ARKC Solutions</strong>
</div>

<h1 class="page-title">Employee Login</h1>

<div class="login-box">
  <p class="login-subtext">Enter your username and password to access the system.</p>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter your username">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter your password">

  <button onclick="login()">Login</button>

  <p class="forgot-link">
    <a href="#" onclick="forgotPassword(); return false;">Forgot password?</a>
  </p>

  <p id="error" style="color:red; margin-top:10px;"></p>

  <div class="login-help">
    <p><strong>Demo usernames:</strong></p>
    <p>rlee</p>
    <p>csantiago</p>
    <p>akulovac</p>
    <p>kjames</p>
  </div>
</div>

<script>
function login() {
  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  const validUsers = ["rlee", "csantiago", "akulovac", "kjames"];

  if (validUsers.includes(username) && password !== "") {
    localStorage.setItem("loggedInUser", username);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").textContent = "Enter a valid username and password.";
  }
}

function forgotPassword() {
  alert("Password reset link sent to your account.");
}
</script>

</body>
</html>
